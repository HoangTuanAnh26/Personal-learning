<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css">
</head>

<body>
  <div class="main">
    <form action="" method="POST" class="form" id="form-1">
      <h3 class="heading">Thành viên đăng ký</h3>
      <p class="desc">Cùng nhau học lập trình miễn phí tại F8 ❤️</p>

      <div class="spacer"></div>

      <div class="form-group">
        <label for="fullname" class="form-label">Tên đầy đủ</label>
        <input id="fullname" name="fullname" type="text" placeholder="VD: Hoang Tuan Anh" class="form-control" rules="required">
        <span class="form-message"></span>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input id="email" name="email" type="text" placeholder="VD: email@domain.com" class="form-control" rules="required|email">
        <span class="form-message"></span>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mật khẩu</label>
        <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" class="form-control" rules="required|min:6">
        <span class="form-message"></span>
      </div>

      <div class="form-group">
        <label for="password_confirmation" class="form-label">Nhập lại mật khẩu</label>
        <input id="password_confirmation" name="password_confirmation" type="password" placeholder="Nhập lại mật khẩu" class="form-control" rules="required|confirmed:password">
        <span class="form-message"></span>
      </div>

      <div class="form-group">
        <label for="avatar" class="form-label">Ảnh đại diện</label>
        <input id="avatar" name="avatar" type="file" class="form-control" rules="required">
        <span class="form-message"></span>
      </div>

      <div class="form-group">
        <label for="gender" class="form-label">Giới tính</label>
        <div>
          <input name="gender" value="Nam" type="radio" class="form-control" rules="required">
          <span>Nam</span>
        </div>
        <div>
          <input name="gender" value="Nữ" type="radio" class="form-control" rules="required">
          <span>Nữ</span>
        </div>
        <span class="form-message"></span>
      </div>

      <div class="form-group">
        <label for="province" class="form-label">Nơi sống</label>
        <select id="province" name="province" class="form-control" rules="required">
          <option value="">Chọn nơi ở hiện tại</option>
          <option value="hn">Hà Nội</option>
          <option value="hcm">Hồ Chí Minh</option>
          <option value="hd">Hải Dương</option>
        </select>
        <span class="form-message"></span>
      </div>

      <button class="form-submit">Đăng ký</button>
    </form>
  </div>

  <script src="validator.js"></script>
  <script>
    // Khởi tạo Validator
    const validator = new Validator('#form-1');

    // Thiết lập hàm onSubmit
    validator.onSubmit = function (formValues) {
      console.log('Dữ liệu form:', formValues);
    };
  </script>
</body>

</html>
